<!DOCTYPE html>
<html lang="en" data-theme="nature">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghassan Alhamoud — Connect</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="preload" href="/assets/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    /* ── Base Layout ── */
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Monogram (top-left) ── */
    .monogram {
      position: absolute;
      top: 20px;
      left: 24px;
      z-index: 10;
      line-height: 0;
    }

    .monogram svg {
      display: block;
    }

    /* ── Avatar ── */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto;
    }

    /* ── Name ── */
    .name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 12px;
      text-align: center;
      color: var(--text-primary);
      line-height: 1.3;
    }

    /* ── Title ── */
    .title {
      font-size: 1rem;
      opacity: 0.7;
      text-align: center;
      color: var(--text-secondary);
      margin: 4px 0 0;
      line-height: 1.4;
      max-width: 320px;
    }

    /* ── CTA Button ── */
    .cta-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius-md);
      font-size: 1.125rem;
      font-weight: 600;
      text-align: center;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s var(--ease-out, ease);
      margin-top: 20px;
    }

    .cta-btn:hover,
    .cta-btn:focus-visible {
      background: var(--accent-hover);
    }

    /* ── Secondary Links Grid ── */
    .links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-top: 16px;
    }

    .links-grid a {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text-primary);
      font-size: 0.9rem;
      padding: 12px;
      transition: background 0.2s var(--ease-out, ease), color 0.2s var(--ease-out, ease);
    }

    .links-grid a:hover,
    .links-grid a:focus-visible {
      background: var(--accent);
      color: #fff;
    }

    .links-grid a:hover svg,
    .links-grid a:focus-visible svg {
      fill: #fff;
    }

    .links-grid svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 24px;
      margin-bottom: 4px;
    }
  </style>
</head>
